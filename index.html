<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>军团战排刀台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; overflow: hidden; }

.header { background: #161b22; padding: 12px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #30363d; }
.header h1 { color: #e94560; font-size: 18px; letter-spacing: 2px; }
.tabs { display: flex; gap: 4px; margin-left: auto; }
.tab { padding: 8px 20px; border: none; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 14px; font-weight: bold; background: #21262d; color: #8b949e; transition: .2s; }
.tab.active { background: #e94560; color: #fff; }
.tab:hover:not(.active) { background: #30363d; color: #e6edf3; }
.header .hint { color: #484f58; font-size: 12px; }

.toolbar { background: #0d1117; padding: 10px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #21262d; flex-wrap: wrap; }
.toolbar label { color: #8b949e; font-size: 13px; }
.toolbar input[type="text"] { background: #161b22; border: 1px solid #30363d; color: #e6edf3; padding: 7px 12px; border-radius: 6px; font-size: 13px; font-family: inherit; width: 140px; }
.toolbar input[type="text"]:focus { outline: none; border-color: #e94560; }
.toolbar input[type="text"]::placeholder { color: #484f58; }
.btn { background: #238636; border: none; color: #fff; padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; font-family: inherit; transition: background .2s; }
.btn:hover { background: #2ea043; }
.btn-red { background: #da3633; }
.btn-red:hover { background: #f85149; }
.btn-gray { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
.btn-gray:hover { background: #30363d; color: #e6edf3; }
.toolbar .sep { width: 1px; height: 24px; background: #30363d; margin: 0 4px; }
.toolbar .spacer { flex: 1; }
.toolbar .tip { color: #484f58; font-size: 12px; }

.main { display: flex; height: calc(100vh - 108px); overflow: hidden; }

/* 左侧：拖拽成员区 */
.member-panel { width: 220px; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; }
.member-panel h3 { padding: 12px 14px 8px; font-size: 12px; color: #484f58; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
.member-panel h3 span { font-size: 11px; color: #e94560; }
.member-input { padding: 10px 14px; border-bottom: 1px solid #21262d; }
.member-input input { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #e6edf3; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-family: inherit; box-sizing: border-box; }
.member-input input:focus { outline: none; border-color: #e94560; }
.member-chips { flex: 1; overflow-y: auto; padding: 10px 14px; display: flex; flex-wrap: wrap; gap: 6px; align-content: flex-start; }
.chip { background: #1f6feb; color: #fff; font-size: 12px; padding: 5px 10px; border-radius: 20px; cursor: grab; user-select: none; display: flex; align-items: center; gap: 4px; white-space: nowrap; box-shadow: 0 2px 6px rgba(31,111,235,0.3); transition: transform .1s, background .2s; }
.chip:hover { background: #388bfd; transform: scale(1.05); }
.chip:active { cursor: grabbing; }
.chip .x { background: rgba(255,255,255,0.2); border: none; color: #fff; width: 16px; height: 16px; border-radius: 50%; cursor: pointer; font-size: 10px; line-height: 16px; text-align: center; flex-shrink: 0; }
.chip .x:hover { background: #f85149; }
.chip.dragging { opacity: 0.5; transform: scale(0.9); }

/* 中间：地图区 */
.map-panel { flex: 1; position: relative; overflow: hidden; background: #0d1117; }
.map-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
.map-container img.bg { max-width: 100%; max-height: 100%; display: block; pointer-events: none; border-radius: 4px; }
.no-bg { color: #484f58; font-size: 14px; text-align: center; padding: 40px 20px; line-height: 2; }
.no-bg p { margin: 6px 0; }
.upload-btn { display: inline-block; background: #238636; color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-top: 8px; }
.upload-btn:hover { background: #2ea043; }
.upload-input { display: none; }

/* 地图上的已放置成员 */
.placed { position: absolute; transform: translate(-50%,-50%); background: #1f6feb; color: #fff; font-size: 12px; padding: 5px 12px; border-radius: 20px; cursor: grab; user-select: none; white-space: nowrap; box-shadow: 0 2px 8px rgba(31,111,235,0.5); border: 2px solid rgba(255,255,255,0.3); z-index: 10; transition: box-shadow .2s, background .2s; }
.placed:hover { background: #388bfd; box-shadow: 0 4px 16px rgba(31,111,235,0.6); }
.placed .del { position: absolute; top: -7px; right: -7px; background: #da3633; border: none; color: #fff; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; font-size: 11px; line-height: 18px; text-align: center; display: none; }
.placed:hover .del { display: block; }

/* 右侧：出刀记录 */
.side-panel { width: 240px; background: #161b22; border-left: 1px solid #30363d; display: flex; flex-direction: column; }
.side-panel h3 { padding: 12px 14px 8px; font-size: 12px; color: #484f58; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
.side-panel h3 span { font-size: 11px; color: #e94560; }
.record-list { flex: 1; overflow-y: auto; padding: 10px 14px; }
.record-item { background: #0d1117; border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; border-left: 3px solid #238636; }
.record-item .member { color: #4fc3f7; font-size: 13px; font-weight: bold; }
.record-item .pos { font-size: 11px; color: #484f58; margin-top: 2px; }
.empty-msg { color: #484f58; font-size: 12px; text-align: center; padding: 20px 0; line-height: 1.8; }
.footer { padding: 10px 14px; border-top: 1px solid #21262d; }
.footer button { width: 100%; padding: 8px; background: #21262d; color: #8b949e; border: 1px solid #30363d; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; }
.footer button:hover { background: #30363d; color: #e6edf3; }
</style>
</head>
<body>

<div class="header">
  <h1>军团战排刀台</h1>
  <div class="tabs">
    <button class="tab active" data-area="D">D区</button>
    <button class="tab" data-area="E">E区</button>
    <button class="tab" data-area="F">F区</button>
  </div>
  <span class="hint">拖拽成员到地图上</span>
</div>

<div class="toolbar">
  <label>添加成员：</label>
  <input type="text" id="memberInput" placeholder="输入昵称回车添加" onkeydown="if(event.key==='Enter')addMember()">
  <button class="btn" onclick="addMember()">+ 添加</button>
  <div class="sep"></div>
  <button class="btn btn-gray" onclick="exportData()">导出</button>
  <button class="btn btn-gray" onclick="importData()">导入</button>
  <div class="sep"></div>
  <button class="btn btn-gray" onclick="clearBg()">清除当前区背景</button>
  <div class="spacer"></div>
  <span class="tip">拖拽成员到地图放上去 · 点击地图上的人名可删除</span>
</div>

<div class="main">
  <!-- 左侧成员 -->
  <div class="member-panel">
    <h3>成员列表 <span id="memberCount"></span></h3>
    <div class="member-input">
      <input type="text" id="quickAdd" placeholder="快速添加后回车" onkeydown="if(event.key==='Enter'){addMember();this.value=''}">
    </div>
    <div class="member-chips" id="memberChips"></div>
  </div>

  <!-- 中间地图 -->
  <div class="map-panel" id="mapPanel">
    <div class="map-container" id="mapContainer">
      <div class="no-bg" id="noBg">
        <p id="noBgText1">当前 D 区还没有设置背景图</p>
        <p>请上传游戏截图作为背景</p>
        <label class="upload-btn" id="uploadLabel">
          上传 D 区背景图
          <input type="file" accept="image/*" class="upload-input" id="bgFileInput" onchange="uploadBg(currentArea, this)">
        </label>
      </div>
      <div id="bgWrapper" style="display:none; position:relative; max-width:100%; max-height:100%;">
        <img id="mapBg" class="bg">
        <label class="upload-btn" id="replaceLabel" style="position:absolute; bottom:12px; right:12px; opacity:0.85;">
          更换背景图
          <input type="file" accept="image/*" class="upload-input" onchange="uploadBg(currentArea, this)">
        </label>
      </div>
    </div>
  </div>

  <!-- 右侧记录 -->
  <div class="side-panel">
    <h3>出刀安排 <span id="placedCount"></span></h3>
    <div class="record-list" id="recordList"></div>
    <div class="footer">
      <button onclick="clearCurrentZone()">清空当前区域</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// 数据
// ═══════════════════════════════════════════
let currentArea = 'D';
let members = [];
let placements = { D: {}, E: {}, F: {} };
let bgImages = { D: null, E: null, F: null };

// ═══════════════════════════════════════════
// 初始化
// ═══════════════════════════════════════════
function init() {
  try {
    const raw = localStorage.getItem('ba_legion_v5');
    if (raw) {
      const d = JSON.parse(raw);
      members = d.members || [];
      placements = d.placements || { D: {}, E: {}, F: {} };
      bgImages = d.bgImages || { D: null, E: null, F: null };
    }
  } catch(e) {}
}
init();

function save() {
  try {
    localStorage.setItem('ba_legion_v5', JSON.stringify({ members, placements, bgImages }));
  } catch(e) {
    if (e.name === 'QuotaExceededError') {
      alert('存储空间已满，请导出数据后清除部分背景图');
    }
  }
}

// ═══════════════════════════════════════════
// 渲染
// ═══════════════════════════════════════════
function render() {
  renderChips();
  renderMap();
  renderRecords();
}

function renderChips() {
  const container = document.getElementById('memberChips');
  document.getElementById('memberCount').textContent = members.length > 0 ? `(${members.length}人)` : '';
  container.innerHTML = '';
  members.forEach(function(name) {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.draggable = true;
    chip.dataset.name = name;
    chip.innerHTML = '<span>' + escapeHtml(name) + '</span><button class="x" onclick="event.stopPropagation();removeMember(\'' + escapeHtml(name).replace(/'/g, "\\'") + '\')">×</button>';

    chip.addEventListener('dragstart', function(e) {
      chip.classList.add('dragging');
      e.dataTransfer.setData('text/plain', name);
      e.dataTransfer.effectAllowed = 'copy';
    });
    chip.addEventListener('dragend', function() {
      chip.classList.remove('dragging');
    });

    container.appendChild(chip);
  });
}

function renderMap() {
  var bg = document.getElementById('mapBg');
  var noBg = document.getElementById('noBg');
  var noBgText1 = document.getElementById('noBgText1');
  var uploadLabel = document.getElementById('uploadLabel');

  if (noBgText1) noBgText1.textContent = '当前 ' + currentArea + ' 区还没有设置背景图';
  if (uploadLabel) uploadLabel.childNodes[0].textContent = '上传 ' + currentArea + ' 区背景图 ';

  var bgWrapper = document.getElementById('bgWrapper');
  if (bgImages[currentArea]) {
    document.getElementById('mapBg').src = bgImages[currentArea];
    bgWrapper.style.display = 'block';
    noBg.style.display = 'none';
  } else {
    bgWrapper.style.display = 'none';
    noBg.style.display = 'block';
  }

  // Remove old placed elements
  document.querySelectorAll('.placed').forEach(function(el) { el.remove(); });

  // Place members
  var zonePlacements = placements[currentArea] || {};
  Object.entries(zonePlacements).forEach(function(entry) {
    var name = entry[0];
    var pos = entry[1];
    createPlacedEl(name, pos.x, pos.y);
  });
}

function createPlacedEl(name, x, y, doSave) {
  if (doSave === undefined) doSave = true;
  var container = document.getElementById('mapContainer');
  var el = document.createElement('div');
  el.className = 'placed';
  el.style.left = x + '%';
  el.style.top = y + '%';
  el.dataset.name = name;
  el.textContent = name;

  var delBtn = document.createElement('button');
  delBtn.className = 'del';
  delBtn.textContent = '×';
  delBtn.onclick = function(e) {
    e.stopPropagation();
    removePlacement(name);
  };
  el.appendChild(delBtn);

  el.draggable = true;
  el.addEventListener('dragstart', function(e) {
    el.style.opacity = '0.5';
    e.dataTransfer.setData('text/plain', name);
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', function() {
    el.style.opacity = '1';
  });

  container.appendChild(el);

  if (doSave) {
    if (!placements[currentArea]) placements[currentArea] = {};
    placements[currentArea][name] = { x: x, y: y };
    save();
    renderRecords();
  }
}

function renderRecords() {
  var list = document.getElementById('recordList');
  var zonePlacements = placements[currentArea] || {};
  var keys = Object.keys(zonePlacements);
  document.getElementById('placedCount').textContent = keys.length > 0 ? `(${keys.length}人)` : '';

  if (keys.length === 0) {
    list.innerHTML = '<div class="empty-msg">还没有人<br>拖拽成员到地图上开始</div>';
    return;
  }

  list.innerHTML = '';
  keys.forEach(function(name) {
    var pos = zonePlacements[name];
    var item = document.createElement('div');
    item.className = 'record-item';
    item.innerHTML = '<div class="member">' + escapeHtml(name) + '</div><div class="pos">位置: ' + Math.round(pos.x) + '% , ' + Math.round(pos.y) + '%</div>';
    list.appendChild(item);
  });
}

function clearBg() {
  if (!bgImages[currentArea]) {
    alert('当前区域没有背景图');
    return;
  }
  if (!confirm('确定清除 ' + currentArea + ' 区背景图？（' + Math.round(bgImages[currentArea].length / 1024) + ' KB）')) return;
  bgImages[currentArea] = null;
  save();
  renderMap();
}

// ═══════════════════════════════════════════
// 成员管理
// ═══════════════════════════════════════════
function addMember() {
  var input = document.getElementById('memberInput');
  var name = input.value.trim();
  if (!name) return;
  if (members.indexOf(name) < 0) {
    members.push(name);
    save();
    renderChips();
  }
  input.value = '';
}

function removeMember(name) {
  members = members.filter(function(m) { return m !== name; });
  ['D','E','F'].forEach(function(z) {
    if (placements[z]) delete placements[z][name];
  });
  save();
  render();
}

// ═══════════════════════════════════════════
// 拖拽放置
// ═══════════════════════════════════════════
var mapPanel = document.getElementById('mapPanel');
var mapContainer = document.getElementById('mapContainer');

mapPanel.addEventListener('dragover', function(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
});

mapPanel.addEventListener('drop', function(e) {
  e.preventDefault();
  var name = e.dataTransfer.getData('text/plain');
  if (!name || members.indexOf(name) < 0) return;

  var rect = mapContainer.getBoundingClientRect();
  var x = ((e.clientX - rect.left) / rect.width) * 100;
  var y = ((e.clientY - rect.top) / rect.height) * 100;

  x = Math.max(3, Math.min(97, x));
  y = Math.max(3, Math.min(97, y));

  createPlacedEl(name, x, y, true);
});

function removePlacement(name) {
  if (placements[currentArea]) delete placements[currentArea][name];
  save();
  renderMap();
  renderRecords();
}

function clearCurrentZone() {
  if (!confirm('确定清空 ' + currentArea + ' 区所有出刀安排？')) return;
  placements[currentArea] = {};
  save();
  render();
}

// ═══════════════════════════════════════════
// 背景上传
// ═══════════════════════════════════════════
function uploadBg(zone, input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    bgImages[zone] = e.target.result;
    save();
    renderMap();
  };
  reader.readAsDataURL(file);
  input.value = '';
}

// ═══════════════════════════════════════════
// 区域切换
// ═══════════════════════════════════════════
document.querySelectorAll('.tab').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentArea = btn.getAttribute('data-area');
    render();
  });
});

// ═══════════════════════════════════════════
// 导入导出
// ═══════════════════════════════════════════
function exportData() {
  try {
    var blob = new Blob([JSON.stringify({ members: members, placements: placements }, null, 2)], {type:'application/json'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'legion_arrange.json';
    a.click();
  } catch(e) { alert('导出失败'); }
}

function importData() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var d = JSON.parse(ev.target.result);
        members = d.members || [];
        placements = d.placements || { D: {}, E: {}, F: {} };
        save();
        render();
      } catch(err) { alert('导入失败: 文件格式错误'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ═══════════════════════════════════════════
// 工具
// ═══════════════════════════════════════════
function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ═══════════════════════════════════════════
// 启动
// ═══════════════════════════════════════════
render();
</script>
</body>
</html>
