<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>军团战排刀台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; overflow: hidden; }

.header { background: #161b22; padding: 12px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #30363d; }
.header h1 { color: #e94560; font-size: 18px; letter-spacing: 2px; }
.tabs { display: flex; gap: 4px; margin-left: auto; }
.tab { padding: 8px 20px; border: none; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 14px; font-weight: bold; background: #21262d; color: #8b949e; transition: .2s; }
.tab.active { background: #e94560; color: #fff; }
.tab:hover:not(.active) { background: #30363d; color: #e6edf3; }
.header .hint { color: #484f58; font-size: 12px; }

.toolbar { background: #0d1117; padding: 10px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #21262d; flex-wrap: wrap; }
.toolbar label { color: #8b949e; font-size: 13px; }
.toolbar input[type="text"] { background: #161b22; border: 1px solid #30363d; color: #e6edf3; padding: 7px 12px; border-radius: 6px; font-size: 13px; font-family: inherit; width: 140px; }
.toolbar input[type="text"]:focus { outline: none; border-color: #e94560; }
.toolbar input[type="text"]::placeholder { color: #484f58; }
.btn { background: #238636; border: none; color: #fff; padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; font-family: inherit; transition: background .2s; }
.btn:hover { background: #2ea043; }
.btn-red { background: #da3633; }
.btn-red:hover { background: #f85149; }
.btn-gray { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
.btn-gray:hover { background: #30363d; color: #e6edf3; }
.toolbar .sep { width: 1px; height: 24px; background: #30363d; margin: 0 4px; }
.toolbar .spacer { flex: 1; }
.toolbar .tip { color: #484f58; font-size: 12px; }

.main { display: flex; height: calc(100vh - 108px); overflow: hidden; }

/* 左侧：拖拽成员区 */
.member-panel { width: 220px; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; }
.member-panel h3 { padding: 12px 14px 8px; font-size: 12px; color: #484f58; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
.member-panel h3 span { font-size: 11px; color: #e94560; }
.member-input { padding: 10px 14px; border-bottom: 1px solid #21262d; }
.member-input input { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #e6edf3; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-family: inherit; box-sizing: border-box; }
.member-input input:focus { outline: none; border-color: #e94560; }
.member-chips { flex: 1; overflow-y: auto; padding: 10px 14px; display: flex; flex-wrap: wrap; gap: 6px; align-content: flex-start; }
.chip { background: #1f6feb; color: #fff; font-size: 12px; padding: 5px 10px; border-radius: 20px; cursor: grab; user-select: none; display: flex; align-items: center; gap: 4px; white-space: nowrap; box-shadow: 0 2px 6px rgba(31,111,235,0.3); transition: transform .1s, background .2s; }
.chip:hover { background: #388bfd; transform: scale(1.05); }
.chip:active { cursor: grabbing; }
.chip .x { background: rgba(255,255,255,0.2); border: none; color: #fff; width: 16px; height: 16px; border-radius: 50%; cursor: pointer; font-size: 10px; line-height: 16px; text-align: center; flex-shrink: 0; }
.chip .x:hover { background: #f85149; }
.chip.dragging { opacity: 0.5; transform: scale(0.9); }

/* 中间：地图区 */
.map-panel { flex: 1; position: relative; overflow: hidden; background: #0d1117; }
.map-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
.map-container img.bg { max-width: 100%; max-height: 100%; display: block; pointer-events: none; border-radius: 4px; }
.no-bg { color: #484f58; font-size: 14px; text-align: center; padding: 40px 20px; line-height: 2; }
.no-bg p { margin: 6px 0; }
.upload-btn { display: inline-block; background: #238636; color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-top: 8px; }
.upload-btn:hover { background: #2ea043; }
.upload-input { display: none; }

/* 地图上的已放置成员 */
.placed { position: absolute; transform: translate(-50%,-50%); background: #1f6feb; color: #fff; font-size: 12px; padding: 5px 12px; border-radius: 20px; cursor: grab; user-select: none; white-space: nowrap; box-shadow: 0 2px 8px rgba(31,111,235,0.5); border: 2px solid rgba(255,255,255,0.3); z-index: 10; transition: box-shadow .2s, background .2s; }
.placed:hover { background: #388bfd; box-shadow: 0 4px 16px rgba(31,111,235,0.6); }
.placed .del { position: absolute; top: -7px; right: -7px; background: #da3633; border: none; color: #fff; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; font-size: 11px; line-height: 18px; text-align: center; display: none; }
.placed:hover .del { display: block; }

/* 右侧：出刀记录 */
.side-panel { width: 240px; background: #161b22; border-left: 1px solid #30363d; display: flex; flex-direction: column; }
.side-panel h3 { padding: 12px 14px 8px; font-size: 12px; color: #484f58; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
.side-panel h3 span { font-size: 11px; color: #e94560; }
.record-list { flex: 1; overflow-y: auto; padding: 10px 14px; }
.record-item { background: #0d1117; border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; border-left: 3px solid #238636; }
.record-item .member { color: #4fc3f7; font-size: 13px; font-weight: bold; }
.record-item .pos { font-size: 11px; color: #484f58; margin-top: 2px; }
.empty-msg { color: #484f58; font-size: 12px; text-align: center; padding: 20px 0; line-height: 1.8; }
.footer { padding: 10px 14px; border-top: 1px solid #21262d; }
.footer button { width: 100%; padding: 8px; background: #21262d; color: #8b949e; border: 1px solid #30363d; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; }
.footer button:hover { background: #30363d; color: #e6edf3; }
</style>
</head>
<body>

<div class="header">
  <h1>军团战排刀台</h1>
  <div class="tabs">
    <button class="tab active" data-area="D">D区</button>
    <button class="tab" data-area="E">E区</button>
    <button class="tab" data-area="F">F区</button>
  </div>
  <span class="hint">拖拽成员到地图上</span>
</div>

<div class="toolbar">
  <label>添加成员：</label>
  <input type="text" id="memberInput" placeholder="输入昵称回车添加" onkeydown="if(event.key==='Enter')addMember()">
  <button class="btn" onclick="addMember()">+ 添加</button>
  <div class="sep"></div>
  <button class="btn btn-gray" onclick="exportData()">导出</button>
  <button class="btn btn-gray" onclick="importData()">导入</button>
  <div class="sep"></div>
  <button class="btn btn-gray" onclick="clearBg()">清除当前区背景</button>
  <div class="spacer"></div>
  <span class="tip">拖拽成员到地图放上去 · 点击地图上的人名可删除</span>
</div>

<div class="main">
  <!-- 左侧成员 -->
  <div class="member-panel">
    <h3>成员列表 <span id="memberCount"></span></h3>
    <div class="member-input">
      <input type="text" id="quickAdd" placeholder="快速添加后回车" onkeydown="if(event.key==='Enter'){addMember();this.value=''}">
    </div>
    <div class="member-chips" id="memberChips"></div>
  </div>

  <!-- 中间地图 -->
  <div class="map-panel" id="mapPanel">
    <div class="map-container" id="mapContainer">
      <div class="no-bg" id="noBg">
        <p id="noBgText1">当前 D 区还没有设置背景图</p>
        <p>请上传游戏截图作为背景</p>
        <label class="upload-btn" id="uploadLabel">
          上传 D 区背景图
          <input type="file" accept="image/*" class="upload-input" id="bgFileInput" onchange="uploadBg(currentArea, this)">
        </label>
      </div>
      <img id="mapBg" class="bg" style="display:none;">
    </div>
  </div>

  <!-- 右侧记录 -->
  <div class="side-panel">
    <h3>出刀安排 <span id="placedCount"></span></h3>
    <div class="record-list" id="recordList"></div>
    <div class="footer">
      <button onclick="clearCurrentZone()">清空当前区域</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// Supabase 配置（公共 anon key，前端安全）
// ═══════════════════════════════════════════
const SUPABASE_URL = 'https://gtnodvesfqajnhnzzcyp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0bm9kdmVzZnFham5obnp6Y3lwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDU1MjQ5MDYsImV4cCI6MjA2MTEwMDkwNn0.Vk7bCXC9Q3p1VCJ9j1aw';
let supabase = null;
let supabaseAvailable = false;
const DB_ID = 'shared_state'; // 固定一条记录的 id

// ═══════════════════════════════════════════
// 数据
// ═══════════════════════════════════════════
let currentArea = 'D';
let members = [];
// 成员出刀记录：{ D: { "张三": [{x,y}, {x,y}], "李四": [{x,y}] } }
let placements = { D: {}, E: {}, F: {} };
let bgImages = { D: null, E: null, F: null };
let db = null;
let supabaseSyncing = false; // 防止 realtime 回写触发死循环

const DB_NAME = 'ba_legion_db';
const DB_VER = 1;
const STORE_NAME = 'bg_store';

// ═══════════════════════════════════════════
// IndexedDB 初始化（背景图存本地）
// ═══════════════════════════════════════════
function openDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open(DB_NAME, DB_VER);
    req.onerror = function() { reject(req.error); };
    req.onsuccess = function() { db = req.result; resolve(db); };
    req.onupgradeneeded = function(e) {
      var d = e.target.result;
      if (!d.objectStoreNames.contains(STORE_NAME)) {
        d.createObjectStore(STORE_NAME);
      }
    };
  });
}

function idbGet(key) {
  return new Promise(function(resolve, reject) {
    if (!db) { resolve(null); return; }
    var tx = db.transaction(STORE_NAME, 'readonly');
    var store = tx.objectStore(STORE_NAME);
    var r = store.get(key);
    r.onsuccess = function() { resolve(r.result || null); };
    r.onerror = function() { reject(r.error); };
  });
}

function idbPut(key, val) {
  return new Promise(function(resolve, reject) {
    if (!db) { resolve(null); return; }
    var tx = db.transaction(STORE_NAME, 'readwrite');
    var store = tx.objectStore(STORE_NAME);
    var r = store.put(val, key);
    r.onsuccess = function() { resolve(); };
    r.onerror = function() { reject(r.error); };
  });
}

// ═══════════════════════════════════════════
// 动态加载 Supabase SDK
// ═══════════════════════════════════════════
function loadSupabaseSDK() {
  return new Promise(function(resolve) {
    if (typeof window.supabase !== 'undefined') { resolve(); return; }
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
    s.onload = function() { resolve(); };
    s.onerror = function() { resolve(); }; // 加载失败也继续（本地模式）
    document.head.appendChild(s);
  });
}

async function initSupabase() {
  // 先动态加载 SDK
  await loadSupabaseSDK();

  // 尝试初始化 Supabase 客户端
  try {
    if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      supabaseAvailable = true;
    }
  } catch(e) { console.warn('Supabase 初始化失败', e); }

  if (!supabaseAvailable) {
    console.warn('Supabase 不可用，进入本地模式（数据不跨设备同步）');
    // 仅从 IndexedDB 恢复背景图
    try {
      await openDB();
      var stored = await idbGet('bgImages');
      if (stored) bgImages = stored;
    } catch(e) {}
    // 从 localStorage 恢复成员和出刀记录
    try {
      var raw = localStorage.getItem('ba_legion_v5');
      if (raw) {
        var d = JSON.parse(raw);
        if (d.members) members = d.members;
        if (d.placements) {
          ['D','E','F'].forEach(function(z) {
            if (!d.placements[z]) return;
            Object.keys(d.placements[z]).forEach(function(name) {
              var val = d.placements[z][name];
              if (!Array.isArray(val)) d.placements[z][name] = [val];
            });
          });
          placements = d.placements;
        }
        if (d.bgImages) bgImages = d.bgImages;
      }
    } catch(e) {}
    return;
  }

  // Supabase 可用：订阅实时同步
  try {
    var ref = supabase.channel('placements-sync');
    ref.on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'placements',
      filter: 'id=eq.' + DB_ID
    }, function(payload) {
      if (supabaseSyncing) return;
      supabaseSyncing = true;
      try {
        if (payload.new && payload.new.data) {
          if (payload.new.data.members) {
            members = payload.new.data.members;
          }
          if (payload.new.data.placements) {
            // 迁移旧格式
            ['D','E','F'].forEach(function(z) {
              if (!payload.new.data.placements[z]) return;
              Object.keys(payload.new.data.placements[z]).forEach(function(name) {
                var val = payload.new.data.placements[z][name];
                if (!Array.isArray(val)) {
                  payload.new.data.placements[z][name] = [val];
                }
              });
            });
            placements = payload.new.data.placements;
          }
          if (payload.new.data.bgImages) {
            bgImages = payload.new.data.bgImages;
            idbPut('bgImages', bgImages);
          }
        }
        render();
      } finally {
        supabaseSyncing = false;
      }
    });
    ref.subscribe();

    var resp = await supabase
      .from('placements')
      .select('*')
      .eq('id', DB_ID)
      .maybeSingle();

    if (resp && resp.data) {
      if (resp.data.data) {
        if (resp.data.data.members) {
          members = resp.data.data.members;
        }
        if (resp.data.data.placements) {
          var p = resp.data.data.placements;
          ['D','E','F'].forEach(function(z) {
            if (!p[z]) return;
            Object.keys(p[z]).forEach(function(name) {
              var val = p[z][name];
              if (!Array.isArray(val)) p[z][name] = [val];
            });
          });
          placements = p;
        }
        if (resp.data.data.bgImages) {
          bgImages = resp.data.data.bgImages;
          idbPut('bgImages', bgImages);
        }
      }
    } else {
      // 首次：插入一条空记录
      await supabase.from('placements').insert([{ id: DB_ID, zone: 'shared', data: { members: [], placements: { D: {}, E: {}, F: {} }, bgImages: { D: null, E: null, F: null } } }]);
    }
  } catch(e) { console.warn('Supabase 加载失败', e); }

  // Fallback：离线时从 localStorage 恢复成员和出刀记录
  try {
    var raw = localStorage.getItem('ba_legion_v5');
    if (raw) {
      var d = JSON.parse(raw);
      if (members.length === 0 && d.members) members = d.members;
      var hasPlacements = Object.keys(placements.D).length === 0 && Object.keys(placements.E).length === 0 && Object.keys(placements.F).length === 0;
      if (hasPlacements && d.placements) {
        ['D','E','F'].forEach(function(z) {
          if (!d.placements[z]) return;
          Object.keys(d.placements[z]).forEach(function(name) {
            var val = d.placements[z][name];
            if (!Array.isArray(val)) d.placements[z][name] = [val];
          });
        });
        placements = d.placements;
      }
      if (d.bgImages) {
        bgImages = d.bgImages;
        idbPut('bgImages', bgImages);
      }
    }
  } catch(e) {}
}

async function init() {
  // 1. 本地：先从 IndexedDB 恢复背景图（不阻塞渲染）
  try {
    await openDB();
    var stored = await idbGet('bgImages');
    if (stored) bgImages = stored;
  } catch(e) { console.warn('IndexedDB 读取失败', e); }

  // 2. 加载/连接 Supabase
  await initSupabase();
}

function save() {
  // 背景图存 IndexedDB（本地私有）
  idbPut('bgImages', bgImages).catch(function(e) { console.warn('IndexedDB 保存失败', e); });

  // 成员+出刀记录+背景图同步到 Supabase（所有人共享）
  if (!supabaseAvailable || supabaseSyncing) return;
  supabaseSyncing = true;
  supabase.from('placements').upsert({
    id: DB_ID,
    zone: 'shared',
    data: { members: members, placements: placements, bgImages: bgImages }
  }).then(function() {
    supabaseSyncing = false;
  }).catch(function(e) {
    supabaseSyncing = false;
    console.warn('Supabase 保存失败', e);
  });
}

// ═══════════════════════════════════════════
// 渲染
// ═══════════════════════════════════════════
function render() {
  renderChips();
  renderMap();
  renderRecords();
}

function renderChips() {
  const container = document.getElementById('memberChips');
  document.getElementById('memberCount').textContent = members.length > 0 ? `(${members.length}人)` : '';
  container.innerHTML = '';
  members.forEach(function(name) {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.draggable = true;
    chip.dataset.name = name;
    chip.innerHTML = '<span>' + escapeHtml(name) + '</span><button class="x" onclick="event.stopPropagation();removeMember(\'' + escapeHtml(name).replace(/'/g, "\\'") + '\')">×</button>';

    chip.addEventListener('dragstart', function(e) {
      chip.classList.add('dragging');
      e.dataTransfer.setData('text/plain', name);
      e.dataTransfer.setData('application/ba-source', 'chip');
      e.dataTransfer.effectAllowed = 'copy';
    });
    chip.addEventListener('dragend', function() {
      chip.classList.remove('dragging');
    });

    container.appendChild(chip);
  });
}

function renderMap() {
  var bg = document.getElementById('mapBg');
  var noBg = document.getElementById('noBg');
  var noBgText1 = document.getElementById('noBgText1');
  var uploadLabel = document.getElementById('uploadLabel');

  if (noBgText1) noBgText1.textContent = '当前 ' + currentArea + ' 区还没有设置背景图';
  if (uploadLabel) uploadLabel.childNodes[0].textContent = '上传 ' + currentArea + ' 区背景图 ';

  if (bgImages[currentArea]) {
    document.getElementById('mapBg').src = bgImages[currentArea];
    document.getElementById('mapBg').style.display = 'block';
    noBg.style.display = 'none';
  } else {
    document.getElementById('mapBg').style.display = 'none';
    noBg.style.display = 'block';
  }

  // Remove old placed elements
  document.querySelectorAll('.placed').forEach(function(el) { el.remove(); });

  // Place members — 每个成员可能有多个位置（数组）
  var zonePlacements = placements[currentArea] || {};
  Object.entries(zonePlacements).forEach(function(entry) {
    var name = entry[0];
    var positions = entry[1]; // array of {x, y}
    positions.forEach(function(pos, idx) {
      createPlacedEl(name, pos.x, pos.y, false, idx);
    });
  });
}

function createPlacedEl(name, x, y, doSave, knifeIndex) {
  if (doSave === undefined) doSave = false;
  var container = document.getElementById('mapContainer');
  var el = document.createElement('div');
  el.className = 'placed';
  el.style.left = x + '%';
  el.style.top = y + '%';
  el.dataset.name = name;
  el.dataset.knife = knifeIndex !== undefined ? knifeIndex : 0;
  // 显示第几刀
  var label = knifeIndex !== undefined ? name + ' (' + (knifeIndex + 1) + '刀)' : name;
  el.textContent = label;

  var delBtn = document.createElement('button');
  delBtn.className = 'del';
  delBtn.textContent = '×';
  delBtn.onclick = function(e) {
    e.stopPropagation();
    removePlacement(name, knifeIndex);
  };
  el.appendChild(delBtn);

  el.draggable = true;
  el.addEventListener('dragstart', function(e) {
    el.style.opacity = '0.5';
    e.dataTransfer.setData('text/plain', name);
    e.dataTransfer.setData('application/ba-source', 'placed');
    e.dataTransfer.setData('application/ba-knife', knifeIndex);
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', function() {
    el.style.opacity = '1';
  });
  // 直接在 placed 元素上监听 dragover/drop（不冒泡到 mapPanel）
  el.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.stopPropagation();
    e.dataTransfer.dropEffect = 'move';
  });
  el.addEventListener('drop', function(e) {
    e.preventDefault();
    e.stopPropagation();
    var src = e.dataTransfer.getData('application/ba-source');
    if (src !== 'placed') return; // 只处理 placed 来源

    var ki = parseInt(e.dataTransfer.getData('application/ba-knife'), 10);
    if (isNaN(ki)) return;

    var rect = mapContainer.getBoundingClientRect();
    var nx = ((e.clientX - rect.left) / rect.width) * 100;
    var ny = ((e.clientY - rect.top) / rect.height) * 100;
    nx = Math.max(3, Math.min(97, nx));
    ny = Math.max(3, Math.min(97, ny));

    var zone = placements[currentArea];
    if (zone && zone[name] && zone[name][ki]) {
      zone[name][ki] = { x: nx, y: ny };
      save();
      renderMap();
      renderRecords();
    }
  });

  container.appendChild(el);

  if (doSave) {
    if (!placements[currentArea]) placements[currentArea] = {};
    if (!placements[currentArea][name]) placements[currentArea][name] = [];
    placements[currentArea][name].push({ x: x, y: y });
    save();
    renderRecords();
  }
}

function renderRecords() {
  var list = document.getElementById('recordList');
  var zonePlacements = placements[currentArea] || {};
  var totalKnives = 0;
  Object.values(zonePlacements).forEach(function(positions) { totalKnives += positions.length; });
  document.getElementById('placedCount').textContent = totalKnives > 0 ? '(' + totalKnives + '刀)' : '';

  if (totalKnives === 0) {
    list.innerHTML = '<div class="empty-msg">还没有人<br>拖拽成员到地图上开始</div>';
    return;
  }

  list.innerHTML = '';
  Object.entries(zonePlacements).forEach(function(entry) {
    var name = entry[0];
    var positions = entry[1];
    positions.forEach(function(pos, idx) {
      var item = document.createElement('div');
      item.className = 'record-item';
      item.innerHTML = '<div class="member">' + escapeHtml(name) + ' <span style="color:#484f58;font-size:10px">第' + (idx + 1) + '刀</span></div><div class="pos">' + Math.round(pos.x) + '% , ' + Math.round(pos.y) + '%</div>';
      list.appendChild(item);
    });
  });
}

function clearBg() {
  if (!bgImages[currentArea]) {
    alert('当前区域没有背景图');
    return;
  }
  if (!confirm('确定清除 ' + currentArea + ' 区背景图？（' + Math.round(bgImages[currentArea].length / 1024) + ' KB）')) return;
  bgImages[currentArea] = null;
  save();
  renderMap();
}

// ═══════════════════════════════════════════
// 成员管理
// ═══════════════════════════════════════════
function addMember() {
  var input = document.getElementById('memberInput');
  var name = input.value.trim();
  if (!name) return;
  if (members.indexOf(name) < 0) {
    members.push(name);
    save();
    renderChips();
  }
  input.value = '';
}

function removeMember(name) {
  members = members.filter(function(m) { return m !== name; });
  ['D','E','F'].forEach(function(z) {
    if (placements[z]) delete placements[z][name];
  });
  save();
  render();
}

// ═══════════════════════════════════════════
// 拖拽放置
// ═══════════════════════════════════════════
var mapPanel = document.getElementById('mapPanel');
var mapContainer = document.getElementById('mapContainer');

mapPanel.addEventListener('dragover', function(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
});
mapPanel.addEventListener('drop', function(e) {
  e.preventDefault();
  var name = e.dataTransfer.getData('text/plain');
  if (!name || members.indexOf(name) < 0) return;

  var rect = mapContainer.getBoundingClientRect();
  var x = ((e.clientX - rect.left) / rect.width) * 100;
  var y = ((e.clientY - rect.top) / rect.height) * 100;
  x = Math.max(3, Math.min(97, x));
  y = Math.max(3, Math.min(97, y));

  var source = e.dataTransfer.getData('application/ba-source');
  var zone = placements[currentArea] || {};
  var existing = zone[name] || [];

  if (source === 'placed') {
    // 从地图上已放置的元素拖拽：更新该刀的位置
    var knifeIdx = parseInt(e.dataTransfer.getData('application/ba-knife'), 10);
    if (!isNaN(knifeIdx) && zone[name] && zone[name][knifeIdx]) {
      zone[name][knifeIdx] = { x: x, y: y };
      save();
      renderMap();
      renderRecords();
    }
  } else {
    // 从成员列表 chip 拖拽：新增一刀
    if (existing.length >= 3) {
      alert(name + ' 已排满3刀，无法继续添加');
      return;
    }
    existing.push({ x: x, y: y });
    zone[name] = existing;
    placements[currentArea] = zone;
    save();
    renderMap();
    renderRecords();
  }
});

function removePlacement(name, knifeIndex) {
  if (!placements[currentArea] || !placements[currentArea][name]) return;
  if (knifeIndex !== undefined && knifeIndex !== null) {
    placements[currentArea][name].splice(knifeIndex, 1);
    if (placements[currentArea][name].length === 0) {
      delete placements[currentArea][name];
    }
  } else {
    delete placements[currentArea][name];
  }
  save();
  renderMap();
  renderRecords();
}

function clearCurrentZone() {
  if (!confirm('确定清空 ' + currentArea + ' 区所有出刀安排？')) return;
  placements[currentArea] = {};
  save();
  render();
}

// ═══════════════════════════════════════════
// 背景上传
// ═══════════════════════════════════════════
function uploadBg(zone, input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    bgImages[zone] = e.target.result;
    save();
    renderMap();
  };
  reader.readAsDataURL(file);
  input.value = '';
}

// ═══════════════════════════════════════════
// 区域切换
// ═══════════════════════════════════════════
document.querySelectorAll('.tab').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentArea = btn.getAttribute('data-area');
    render();
  });
});

// ═══════════════════════════════════════════
// 导入导出
// ═══════════════════════════════════════════
function exportData() {
  try {
    var blob = new Blob([JSON.stringify({ members: members, placements: placements, bgImages: bgImages }, null, 2)], {type:'application/json'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'legion_arrange.json';
    a.click();
  } catch(e) { alert('导出失败'); }
}

function importData() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var d = JSON.parse(ev.target.result);
        members = d.members || [];
        placements = d.placements || { D: {}, E: {}, F: {} };
        if (d.bgImages) bgImages = d.bgImages;
        // 本地备份（离线时也能用）
        try { localStorage.setItem('ba_legion_v5', JSON.stringify({ members: members, placements: placements, bgImages: bgImages })); } catch(e) {}
        // 同步到 Supabase（如果有的话），然后刷新
        save();
        setTimeout(function() { render(); }, 100);
      } catch(err) { alert('导入失败: 文件格式错误'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ═══════════════════════════════════════════
// 工具
// ═══════════════════════════════════════════
function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ═══════════════════════════════════════════
// 启动
// ═══════════════════════════════════════════
init().then(render);
</script>
</body>
</html>
