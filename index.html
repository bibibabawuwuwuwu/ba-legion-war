<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>餒餒研究所-军团战排刀台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
body { font-family: 'Microsoft YaHei', sans-serif; font-size: 14px; background: #0d1117; color: #e6edf3; min-height: 100vh; overflow: hidden; }

.header { background: #161b22; padding: 6px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #30363d; }
.header h1 { color: #e94560; font-size: 14px; letter-spacing: 1px; }
.tabs { display: flex; gap: 3px; }
.tab { padding: 5px 14px; border: none; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 13px; font-weight: bold; background: #21262d; color: #8b949e; transition: .2s; }
.tab.active { background: #e94560; color: #fff; }
.tab:hover:not(.active) { background: #30363d; color: #e6edf3; }
.header .hint { color: #484f58; font-size: 11px; margin-left: auto; }

.topbar { background: #161b22; padding: 5px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #30363d; flex-wrap: wrap; }
.topbar h1 { color: #e94560; font-size: 30px; letter-spacing: 1px; white-space: nowrap; font-weight: bold; }
.vsep { width: 1px; height: 20px; background: #30363d; flex-shrink: 0; }
.topbar .sep { width: 1px; height: 20px; background: #30363d; flex-shrink: 0; }
.topbar label { color: #8b949e; font-size: 12px; white-space: nowrap; }
.topbar input[type="text"] { background: #161b22; border: 1px solid #30363d; color: #e6edf3; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-family: inherit; width: 110px; }
.topbar input[type="text"]:focus { outline: none; border-color: #e94560; }
.topbar input[type="text"]::placeholder { color: #484f58; }
.topbar input[type="password"] { background: #161b22; border: 1px solid #30363d; color: #e6edf3; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-family: inherit; }
.topbar input[type="password"]:focus { outline: none; border-color: #e94560; }
.topbar input[type="password"]::placeholder { color: #484f58; }
.btn { background: #238636; border: none; color: #fff; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; font-family: inherit; transition: background .2s; }
.btn:hover { background: #2ea043; }
.btn-red { background: #da3633; }
.btn-red:hover { background: #f85149; }
.btn-gray { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
.btn-gray:hover { background: #30363d; color: #e6edf3; }
.lock-info { color: #484f58; font-size: 11px; white-space: nowrap; }
.version-info { color: #484f58; font-size: 11px; white-space: nowrap; }
.lock-info.active { color: #2ea043; }
.lock-info .lock-name { color: #4fc3f7; font-weight: bold; }

.toolbar { background: #0d1117; padding: 6px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #21262d; flex-wrap: wrap; }
.toolbar label { color: #8b949e; font-size: 12px; }
.toolbar input[type="text"] { background: #161b22; border: 1px solid #30363d; color: #e6edf3; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-family: inherit; width: 120px; }
.toolbar input[type="text"]:focus { outline: none; border-color: #e94560; }
.toolbar input[type="text"]::placeholder { color: #484f58; }
.btn { background: #238636; border: none; color: #fff; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; font-family: inherit; transition: background .2s; }
.btn:hover { background: #2ea043; }
.btn-red { background: #da3633; }
.btn-red:hover { background: #f85149; }
.btn-gray { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
.btn-gray:hover { background: #30363d; color: #e6edf3; }
.toolbar .sep { width: 1px; height: 20px; background: #30363d; margin: 0 4px; }
.toolbar .spacer { flex: 1; }
.toolbar .tip { color: #484f58; font-size: 12px; }

/* 横屏提示 overlay — 仅手机竖屏显示 */
.rotate-overlay { display: none; }
@media (orientation: portrait) and (max-width: 768px) {
  .rotate-overlay { display: flex; }
}
.rotate-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #0d1117;
  z-index: 9999;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.rotate-box { text-align: center; }
.rotate-icon { font-size: 64px; margin-bottom: 24px; display: flex; justify-content: center; }
.rotate-icon .phone-wrap { position: relative; display: inline-block; }
.rotate-icon .phone {
  width: 36px;
  height: 60px;
  border: 3px solid #e6edf3;
  border-radius: 6px;
  display: inline-block;
}
.rotate-icon .arrow {
  position: absolute;
  top: 50%;
  right: -32px;
  transform: translateY(-50%);
  color: #e94560;
  font-size: 36px;
  line-height: 1;
  animation: rotateHint 1.5s ease-in-out infinite;
}
@keyframes rotateHint {
  0%, 100% { transform: translateY(-50%) rotate(0deg); }
  50% { transform: translateY(-50%) rotate(90deg); }
}
.rotate-title { color: #e6edf3; font-size: 20px; font-weight: bold; margin-bottom: 12px; }
.rotate-hint { color: #484f58; font-size: 14px; }

.main { display: flex; height: calc(100vh - 44px); overflow: hidden; min-height: 0; }

/* 移动端横屏（高度<=500px）：全屏flex布局，地图自动填满 */
@media (max-height: 500px), (max-width: 768px) and (orientation: landscape) {
  html, body { height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
  body > .topbar { flex-shrink: 0; }
  .main { flex: 1; min-height: 0; overflow: hidden; display: flex; flex-shrink: 0; }
  .topbar { flex-wrap: nowrap !important; overflow-x: auto; overflow-y: hidden; padding: 3px 8px; gap: 6px; box-sizing: border-box; height: auto; }
  .topbar h1 { font-size: 14px !important; }
  .topbar .btn { padding: 2px 6px; font-size: 11px; }
  .tab { padding: 3px 8px; font-size: 12px; }
  .lock-info, .version-info { font-size: 10px; }
  .member-panel { width: 16vw !important; min-width: 45px; max-width: 80px; flex-shrink: 0; overflow: hidden; }
  .side-panel { width: 12vw !important; min-width: 35px; max-width: 65px; flex-shrink: 0; overflow: hidden; }
  .map-panel { flex: 1; min-width: 0; overflow: hidden; display: flex; flex-direction: column; }
  .map-container { flex: 1; min-height: 0; overflow: hidden; }
  .map-container img.bg { width: 100%; height: 100%; object-fit: contain; }
}

/* 移动端竖屏：侧面板按比例缩放，与桌面保持一致 */
@media (max-width: 768px) and (orientation: portrait) {
  html, body { height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
  body > .topbar { flex-shrink: 0; }
  .main { flex: 1; min-height: 0; overflow: hidden; display: flex; flex-shrink: 0; }
  .member-panel { width: 22vw !important; min-width: 60px; max-width: 120px; flex-shrink: 0; overflow: hidden; }
  .side-panel { width: 18vw !important; min-width: 50px; max-width: 90px; flex-shrink: 0; overflow: hidden; }
  .map-panel { flex: 1; min-width: 0; overflow: hidden; display: flex; flex-direction: column; }
  .map-container { flex: 1; min-height: 0; overflow: hidden; }
  .map-container img.bg { width: 100%; height: 100%; object-fit: contain; }
}

/* 左侧：拖拽成员区 */
.member-panel { width: 260px; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; }
.member-panel h3 { padding: 8px 14px 6px; font-size: 11px; color: #484f58; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
.member-panel h3 span { font-size: 10px; color: #e94560; }
.member-input { padding: 8px 14px; border-bottom: 1px solid #21262d; }
.member-input input { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #e6edf3; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-family: inherit; box-sizing: border-box; }
.member-input input:focus { outline: none; border-color: #e94560; }
.member-chips { flex: 1; overflow-y: auto; padding: 10px 14px; display: flex; flex-wrap: wrap; gap: 6px; align-content: flex-start; }

/* 中间：地图区 */
.map-panel { flex: 1; position: relative; overflow: hidden; background: #0d1117; display: flex; flex-direction: column; }
.map-container { position: relative; width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; aspect-ratio: 16/9; min-height: 0; }
.map-container img.bg { width: 100%; height: 100%; display: block; pointer-events: none; border-radius: 4px; object-fit: contain; object-position: center; }
.no-bg { color: #484f58; font-size: 14px; text-align: center; padding: 40px 20px; line-height: 2; }
.no-bg p { margin: 6px 0; }
.upload-btn { display: inline-block; background: #238636; color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-top: 8px; }
.upload-btn:hover { background: #2ea043; }
.upload-input { display: none; }

/* 地图上的已放置成员 */
.placed { position: absolute; transform: translate(-50%,-50%); background: #1f6feb; color: #fff; font-size: 12px !important; padding: 5px 12px; border-radius: 20px; cursor: grab; user-select: none; white-space: nowrap; box-shadow: 0 2px 8px rgba(31,111,235,0.5); border: 2px solid rgba(255,255,255,0.3); z-index: 10; transition: box-shadow .2s, background .2s; -webkit-text-size-adjust: none; -moz-text-size-adjust: none; text-size-adjust: none; }
.placed:hover { background: #388bfd; box-shadow: 0 4px 16px rgba(31,111,235,0.6); }
.placed .del { position: absolute; top: -7px; right: -7px; background: #da3633; border: none; color: #fff; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; font-size: 11px; line-height: 18px; text-align: center; display: none; }
.placed:hover .del { display: block; }

/* 右侧：出刀记录 */
.side-panel { width: 240px; background: #161b22; border-left: 1px solid #30363d; display: flex; flex-direction: column; }
.side-panel h3 { padding: 12px 14px 8px; font-size: 12px; color: #484f58; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
.side-panel h3 span { font-size: 11px; color: #e94560; }
.record-list { flex: 1; overflow-y: auto; padding: 10px 14px; }
.record-item { background: #0d1117; border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; border-left: 3px solid #238636; }
.record-item .member { color: #4fc3f7; font-size: 13px; font-weight: bold; }
.record-item .pos { font-size: 11px; color: #484f58; margin-top: 2px; }
.empty-msg { color: #484f58; font-size: 12px; text-align: center; padding: 20px 0; line-height: 1.8; }

/* 操作锁 Banner */
.lock-banner { background: #161b22; padding: 5px 16px; display: none; align-items: center; gap: 12px; border-bottom: 1px solid #30363d; font-size: 12px; }
.lock-banner.active { display: flex; }
.lock-banner .lock-icon { color: #2ea043; font-size: 16px; }
.lock-banner .lock-text { color: #e6edf3; }
.lock-banner .lock-name { color: #4fc3f7; font-weight: bold; }
.lock-banner .lock-hint { color: #484f58; font-size: 12px; margin-left: auto; }
.lock-banner .btn-release { background: #da3633; border: none; color: #fff; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit; margin-left: 8px; }
.lock-banner .btn-release:hover { background: #f85149; }
.lock-banner .btn-acquire { background: #238636; border: none; color: #fff; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit; margin-left: auto; }
.lock-banner .btn-acquire:hover { background: #2ea043; }

/* 锁弹窗 */
.lock-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
.lock-modal.active { display: flex; }
.lock-modal .modal-box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 32px 40px; text-align: center; min-width: 320px; }
.lock-modal h2 { color: #e6edf3; font-size: 18px; margin-bottom: 6px; }
.lock-modal p { color: #484f58; font-size: 13px; margin-bottom: 20px; }
.lock-modal input { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; padding: 10px 14px; border-radius: 6px; font-size: 14px; font-family: inherit; width: 100%; box-sizing: border-box; margin-bottom: 16px; text-align: center; }
.lock-modal input:focus { outline: none; border-color: #e94560; }
.lock-modal .modal-btns { display: flex; gap: 10px; justify-content: center; }
.lock-modal .btn-ok { background: #238636; border: none; color: #fff; padding: 8px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: inherit; font-weight: bold; }
/* 成员 chip */
.chip {
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 5px 8px;
  cursor: grab;
  user-select: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: #e6edf3;
  white-space: nowrap;
  line-height: 1;
  width: auto;
  max-width: 100%;
}
.chip:hover { background: #1c2128; border-color: #4fc3f7; }
.chip.dragging { opacity: 0.5; }
.chip .x { display: none; } /* X按钮已移除 */

/* chip 右侧3格进度指示 */
.chip-name {
  font-weight: bold;
  color: #4fc3f7;
  font-size: 12px;
}
.chip-knives {
  display: flex;
  gap: 3px;
  flex-shrink: 0;
}
.chip-knives span {
  width: 12px;
  height: 12px;
  border-radius: 3px;
  background: #238636;
  border: 1px solid #2ea043;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.chip-knives span.used {
  background: #e94560;
  border-color: #f85149;
}
.chip-knives span:hover:not(.used) { background: #2ea043; }

/* 成员 chip 非锁 holder 禁用态 */
.member-chips.readonly .chip { cursor: not-allowed; opacity: 0.6; }
.member-chips.readonly .chip .x { display: none; }
.member-chips.readonly .chip-knives span { cursor: not-allowed; pointer-events: none; }
.member-chips.readonly .chip.locked { cursor: pointer; opacity: 1; border: 1px solid #e94560; }
.member-chips.readonly .chip.locked:hover { border-color: #f85149; background: #1c2128; }

/* 地图放置元素非锁 holder 禁用 */
.map-container.readonly .placed { cursor: not-allowed; }
.map-container.readonly .placed .del { display: none !important; }

/* 右侧 chip：3格在名字下方，已用橙色 */
.done-chip {
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 6px 10px;
  display: inline-flex;
  gap: 5px;
  align-items: center;
  white-space: nowrap;
  cursor: pointer;
}
.done-chip:hover { background: #1c2128; border-color: #e94560; }
.done-chip .done-name {
  font-weight: bold;
  color: #4fc3f7;
  font-size: 12px;
}
.done-knives {
  display: flex;
  gap: 3px;
}
.done-knives span {
  width: 12px;
  height: 12px;
  border-radius: 3px;
  background: #238636;
  border: 1px solid #2ea043;
}
.done-knives span.used {
  background: #e94560;
  border-color: #f85149;
}
.side-panel { width: 240px; background: #161b22; border-left: 1px solid #30363d; display: flex; flex-direction: column; }
.side-panel h3 { padding: 8px 14px 6px; font-size: 11px; color: #484f58; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
.side-panel h3 span { font-size: 10px; color: #e94560; }
.record-list { flex: 1; overflow-y: auto; padding: 8px 14px; display: flex; flex-wrap: wrap; gap: 6px; align-content: flex-start; }
.empty-msg { color: #484f58; font-size: 12px; text-align: center; padding: 12px 0; line-height: 1.8; }
.record-item .bar { height: 4px; background: #21262d; border-radius: 2px; margin-top: 4px; overflow: hidden; }
.record-item .bar-fill { height: 100%; background: #238636; border-radius: 2px; transition: width 0.3s; }
.record-item .bar-label { font-size: 10px; color: #484f58; margin-top: 2px; }
/* 右键快捷菜单 */
#ctxMenu { position: fixed; background: #1c2128; border: 1px solid #30363d; border-radius: 8px; padding: 4px 0; z-index: 9999; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.4); min-width: 130px; }
#ctxMenu .ctx-item { padding: 8px 16px; cursor: pointer; font-size: 13px; color: #e6edf3; }
#ctxMenu .ctx-item:hover { background: #388bfd33; color: #79c0ff; }
#ctxMenu .ctx-item.danger { color: #e94560; }
#ctxMenu .ctx-item.danger:hover { background: #e9456022; }
#ctxMenu .ctx-divider { height: 1px; background: #30363d; margin: 4px 0; }
#ctxMenuUndo { position: fixed; background: #1c2128; border: 1px solid #30363d; border-radius: 8px; padding: 4px 0; z-index: 9999; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.4); min-width: 130px; }
#ctxMenuUndo .ctx-item { padding: 8px 16px; cursor: pointer; font-size: 13px; color: #e6edf3; }
#ctxMenuUndo .ctx-item:hover { background: #e9456033; color: #e94560; }
</style>
</head>
<body>

<div class="topbar">
  <h1>餒餒研究所-军团战排刀台</h1>
  <div class="tabs">
    <button class="tab active" data-area="D">D区</button>
    <button class="tab" data-area="E">E区</button>
    <button class="tab" data-area="F">F区</button>
  </div>
  <span class="vsep"></span>
  <button class="btn btn-gray" onclick="exportData()">导出名单</button>
  <button class="btn btn-gray" onclick="importData()">导入名单</button>
  <div class="sep"></div>
  <button class="btn btn-gray" onclick="clearBg()">清背景</button>
  <button class="btn btn-gray" onclick="clearAllPlacements()">重置排刀</button>
  <div class="vsep"></div>
  <span class="version-info" id="versionInfo">v1.1.0</span>
  <span class="lock-info" id="lockInfo"></span>
  <button class="btn" id="btnLock" onclick="showLockModal()">申请操作权</button>
  <button class="btn btn-red" id="btnRelease" style="display:none" onclick="releaseLock()">释放操作权</button>
</div>

<div class="lock-modal" id="lockModal">
  <div class="modal-box">
    <h2>输入口令申请操作权限</h2>
    <p>指挥者输入口令获取排刀操作权限</p>
    <input type="password" id="lockPasswordInput" placeholder="输入指挥者口令" onkeydown="if(event.key==='Enter')submitLockPassword()">
    <div class="modal-btns">
      <button class="btn-ok" onclick="submitLockPassword()">确认</button>
      <button class="btn-cancel" onclick="hideLockModal()">取消</button>
    </div>
    <div class="error-msg" id="lockErrorMsg"></div>
  </div>
</div>

<!-- 横屏提示 -->
<div class="rotate-overlay" id="rotateOverlay">
  <div class="rotate-box">
    <div class="rotate-icon">
      <div class="phone-wrap">
        <div class="phone"></div>
        <div class="arrow">&#x21BB;</div>
      </div>
    </div>
    <p class="rotate-title">请使用横屏浏览</p>
    <p class="rotate-hint">旋转设备后将自动进入</p>
  </div>
</div>

<div class="main">
  <!-- 左侧成员 -->
  <div class="member-panel">
    <h3>待安排出刀 <span id="memberCount"></span></h3>
    <div class="member-chips" id="memberChips"></div>
  </div>

  <!-- 中间地图 -->
  <div class="map-panel" id="mapPanel">
    <div class="map-container" id="mapContainer">
      <div class="no-bg" id="noBg">
        <p id="noBgText1">当前 D 区还没有设置背景图</p>
        <p>请上传游戏截图作为背景</p>
        <label class="upload-btn" id="uploadLabel">
          上传 D 区背景图
          <input type="file" accept="image/*" class="upload-input" id="bgFileInput" onchange="uploadBg(currentArea, this)">
        </label>
      </div>
      <img id="mapBg" class="bg" style="display:none;">
    </div>
  </div>

  <!-- 右侧记录 -->
  <div class="side-panel">
    <h3>已完成出刀 <span id="placedCount"></span></h3>
    <div class="record-list" id="recordList"></div>
  </div>
</div>

<div id="ctxMenu">
  <div class="ctx-item" onclick="ctxAction(1)">已出1刀</div>
  <div class="ctx-item" onclick="ctxAction(2)">已出2刀</div>
  <div class="ctx-item" onclick="ctxAction(3)">已出3刀</div>
</div>
<div id="ctxMenuUndo">
  <div class="ctx-item" onclick="ctxUndoAction(1)">退回1刀</div>
  <div class="ctx-item" onclick="ctxUndoAction(2)">退回2刀</div>
  <div class="ctx-item" onclick="ctxUndoAction(3)">退回3刀</div>
</div>
<script>
// ═══════════════════════════════════════════
// Supabase 配置（公共 anon key，前端安全）

// ═══════════════════════════════════════════
// IndexedDB 初始化（背景图存本地）
// ═══════════════════════════════════════════
function openDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open(DB_NAME, DB_VER);
    req.onerror = function() { reject(req.error); };
    req.onsuccess = function() { db = req.result; resolve(db); };
    req.onupgradeneeded = function(e) {
      var d = e.target.result;
      if (!d.objectStoreNames.contains(STORE_NAME)) {
        d.createObjectStore(STORE_NAME);
      }
    };
  });
}

// IndexedDB 同步内存缓存（renderMap 同步读取用）
var _idbCache = {};

function idbGet(key) {
  return new Promise(function(resolve, reject) {
    if (!db) { resolve(null); return; }
    var tx = db.transaction(STORE_NAME, 'readonly');
    var store = tx.objectStore(STORE_NAME);
    var r = store.get(key);
    r.onsuccess = function() {
      var val = r.result || null;
      _idbCache[key] = val; // 同步写入缓存
      resolve(val);
    };
    r.onerror = function() { reject(r.error); };
  });
}

function idbPut(key, val) {
  return new Promise(function(resolve, reject) {
    if (!db) { resolve(null); return; }
    // 同步写入缓存（先于 async 写入完成，确保 renderMap 读取到最新值）
    _idbCache[key] = val;
    var tx = db.transaction(STORE_NAME, 'readwrite');
    var store = tx.objectStore(STORE_NAME);
    var r = store.put(val, key);
    r.onsuccess = function() { resolve(); };
    r.onerror = function() { reject(r.error); };
  });
}

var _supabaseCreateClient = null;

async function loadSupabaseSDK() {
  if (_supabaseCreateClient) return;
  try {
    var mod = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    _supabaseCreateClient = mod.createClient;
  } catch(e) {
    console.warn('Supabase SDK 加载失败', e);
  }
}

async function initSupabase() {
  // 先动态加载 SDK
  await loadSupabaseSDK();

  // 尝试初始化 Supabase 客户端
  try {
    if (_supabaseCreateClient) {
      supabase = _supabaseCreateClient(SUPABASE_URL, SUPABASE_KEY);
      supabaseAvailable = true;
    }
  } catch(e) { console.warn('Supabase 初始化失败', e); }

  if (!supabaseAvailable) {
    console.warn('Supabase 不可用，进入本地模式（数据不跨设备同步）');
    // 仅从 IndexedDB 恢复背景图
    try {
      await openDB();
      var stored = await idbGet('bgImages');
      if (stored) bgImages = migrateBgImages(stored);
    } catch(e) {}
    // 从 localStorage 恢复成员和出刀记录
    try {
      var raw = localStorage.getItem('ba_legion_v5');
      if (raw) {
        var d = JSON.parse(raw);
        if (d.members) members = d.members;
        if (d.placements) {
          ['D','E','F'].forEach(function(z) {
            if (!d.placements[z]) return;
            Object.keys(d.placements[z]).forEach(function(name) {
              var val = d.placements[z][name];
              if (!Array.isArray(val)) d.placements[z][name] = [val];
            });
          });
          placements = d.placements;
        }
        if (d.bgImages) bgImages = migrateBgImages(d.bgImages);
        if (d.knivesLeft) {
          knivesLeft = d.knivesLeft;
        } else {
          // 兼容旧数据：根据已完成刀数计算剩余刀数
          members.forEach(function(name) {
            var done = 0;
            ['D','E','F'].forEach(function(z) { done += (placements[z] && placements[z][name] ? placements[z][name].length : 0); });
            knivesLeft[name] = Math.max(0, 3 - done);
          });
        }
      }
    } catch(e) {}
    dbReady = true; // 离线数据就绪
    render();
    return;
  }

  // Supabase 可用：先完成 fetch，等 IndexedDB 读取完，再建立订阅
  // 解决桌面端网络快导致订阅在 IndexedDB 读取前触发的竞速问题
  supabaseSyncing = true;
  try {
    // 先确保 IndexedDB 已打开（init() 里的 idbGet 可能还在进行中）
    await openDB();
    // fetch 前再次读取 bgImages（捕获 init() 时尚未完成的 IndexedDB 读取结果）
    var stored2 = await idbGet('bgImages');
    if (stored2) bgImages = migrateBgImages(stored2);

    // fetch 当前数据
    var resp = await supabase
      .from('placements')
      .select('*')
      .eq('id', DB_ID)
      .maybeSingle();

    if (resp && resp.data) {
      if (resp.data.data) {
        if (resp.data.data.members) {
          members = resp.data.data.members;
        }
        if (resp.data.data.placements) {
          var p = resp.data.data.placements;
          ['D','E','F'].forEach(function(z) {
            if (!p[z]) return;
            Object.keys(p[z]).forEach(function(name) {
              var val = p[z][name];
              if (!Array.isArray(val)) p[z][name] = [val];
            });
          });
          placements = p;
        }
        // bgImages：以 Supabase 为准（跨设备同步源），本地只作缓存加速首次加载
        bgImages = migrateBgImages(resp.data.data.bgImages || { D: null, E: null, F: null });
        idbPut('bgImages', bgImages);
        // knivesLeft：本地优先，Supabase 只补充本地没有的名字
        if (resp.data.data.knivesLeft) {
          var supabaseKl = resp.data.data.knivesLeft;
          var hasLocalKl = Object.keys(knivesLeft).length > 0;
          if (hasLocalKl) {
            Object.keys(supabaseKl).forEach(function(name) {
              if (!(name in knivesLeft)) knivesLeft[name] = supabaseKl[name];
            });
          } else {
            knivesLeft = supabaseKl;
          }
        } else {
          // 兼容旧数据：根据已完成刀数计算剩余刀数
          (resp.data.data.members || []).forEach(function(name) {
            if (name in knivesLeft) return; // 已从本地保留的跳过
            var done = 0;
            ['D','E','F'].forEach(function(z) { done += (placements[z] && placements[z][name] ? placements[z][name].length : 0); });
            knivesLeft[name] = Math.max(0, 3 - done);
          });
        }
      }
    } else {
      // 首次：插入一条空记录
      await supabase.from('placements').insert([{ id: DB_ID, zone: 'shared', data: { members: [], placements: { D: {}, E: {}, F: {} }, knivesLeft: {}, bgImages: { D: null, E: null, F: null } } }]);
    }

    // fetch 完成 + IndexedDB 已读取，现在建立订阅（时机安全，不会竞速）
    var ref = supabase.channel('placements-sync');
    ref.on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'placements',
      filter: 'id=eq.' + DB_ID
    }, function(payload) {
      if (supabaseSyncing) return;
      supabaseSyncing = true;
      try {
        if (payload.new && payload.new.data) {
          var dataChanged = false;
          if (payload.new.data.members && JSON.stringify(members) !== JSON.stringify(payload.new.data.members)) {
            members = payload.new.data.members;
            dataChanged = true;
          }
          if (payload.new.data.placements) {
            var newP = payload.new.data.placements;
            ['D','E','F'].forEach(function(z) {
              if (!newP[z]) newP[z] = {};
              Object.keys(newP[z]).forEach(function(name) {
                if (!Array.isArray(newP[z][name])) newP[z][name] = [newP[z][name]];
              });
            });
            if (JSON.stringify(placements) !== JSON.stringify(newP)) {
              placements = newP;
              dataChanged = true;
            }
          }
          if (payload.new.data.bgImages) {
            // Supabase 主动发了 bgImages（哪怕是 null）：直接用，迁移哨兵值
            bgImages = migrateBgImages(payload.new.data.bgImages);
            idbPut('bgImages', bgImages);
            dataChanged = true;
          } else {
            // Supabase 把 bgImages 字段写成 null（其他设备清空背景）：同步到本地
            bgImages = { D: null, E: null, F: null };
            idbPut('bgImages', bgImages);
            dataChanged = true;
          }
          if (payload.new.data.knivesLeft) {
            if (JSON.stringify(knivesLeft) !== JSON.stringify(payload.new.data.knivesLeft)) {
              knivesLeft = payload.new.data.knivesLeft;
              dataChanged = true;
            }
          } else {
            (payload.new.data.members || members || []).forEach(function(name) {
              var done = 0;
              ['D','E','F'].forEach(function(z) { done += (placements[z] && placements[z][name] ? placements[z][name].length : 0); });
              knivesLeft[name] = Math.max(0, 3 - done);
            });
            dataChanged = true;
          }
          if (dataChanged) render();
        }
      } finally {
        supabaseSyncing = false;
      }
    });
    ref.subscribe();

    // 操作锁实时订阅
    var lockRef = supabase.channel('operator-lock-sync');
    lockRef.on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'operator_lock',
      filter: 'id=eq.' + LOCK_ID
    }, function(payload) {
      if (lockSyncing) return;
      lockSyncing = true;
      try {
        if (payload.new) {
          window._cachedLock = {
            operator_id: payload.new.operator_id,
            operator_name: payload.new.operator_name,
            lease_until: payload.new.lease_until,
            is_locked: payload.new.is_locked
          };
        }
        updateLockBanner();
        updateDragEnabled();
      } finally {
        lockSyncing = false;
      }
    });
    lockRef.subscribe();

    // 初始化拉取锁状态
    await fetchLockState();

    // fetch + 订阅建立完成，开放渲染
    supabaseSyncing = false;
    dbReady = true; // 数据就绪，后续渲染正常放行
    render(); // 用已加载数据渲染一次
  } catch(e) { console.warn('Supabase 加载失败', e); dbReady = true; render(); }

  // Fallback：离线时从 localStorage 恢复成员和出刀记录
  try {
    var raw = localStorage.getItem('ba_legion_v5');
    if (raw) {
      var d = JSON.parse(raw);
      // 优先用 localStorage 的完整数据（成员+排刀+剩余刀数）
      // 只要 localStorage 任意 zone 有排刀记录，就用它
      var localHasPlacements = d.placements && (
        Object.keys(d.placements.D || {}).length > 0 ||
        Object.keys(d.placements.E || {}).length > 0 ||
        Object.keys(d.placements.F || {}).length > 0
      );
      if (localHasPlacements) {
        ['D','E','F'].forEach(function(z) {
          if (!d.placements[z]) return;
          Object.keys(d.placements[z]).forEach(function(name) {
            var val = d.placements[z][name];
            if (!Array.isArray(val)) d.placements[z][name] = [val];
          });
        });
        placements = d.placements;
        if (d.knivesLeft) knivesLeft = d.knivesLeft;
        if (d.members && d.members.length > 0) members = d.members;
      } else if (members.length === 0 && d.members) {
        // Supabase 和 localStorage 都没有排刀数据，仅恢复成员名单
        members = d.members;
      }
      }
  } catch(e) {}
}

async function init() {
  // 0. 生成/恢复本标签页的操作者 ID
  try {
    operatorId = localStorage.getItem('ba_operator_id');
    if (!operatorId) {
      operatorId = generateOperatorId();
      localStorage.setItem('ba_operator_id', operatorId);
    }
  } catch(e) {}

  // 1. 本地：先从 IndexedDB 恢复背景图（不阻塞渲染）
  try {
    await openDB();
    var stored = await idbGet('bgImages');
    if (stored) bgImages = migrateBgImages(stored);
  } catch(e) { console.warn('IndexedDB 读取失败', e); }

  // 2. 加载/连接 Supabase
  await initSupabase();

  // 3. 初始化锁 UI
  updateLockBanner();
  updateDragEnabled();

  // 4. 非锁持有者每 5 秒检查一次锁状态
  lockCheckTimer = setInterval(function() {
    if (!isLockHolder) fetchLockState();
    else updateLockBanner(); // 更新剩余秒数
  }, 5000);
}

function save() {
  // 背景图存 IndexedDB（本地私有）
  idbPut('bgImages', bgImages).catch(function(e) { console.warn('IndexedDB 保存失败', e); });

  // 成员+出刀记录+背景图同步到 Supabase（所有人共享）
  if (!supabaseAvailable) return;
  // 防卡死：超过 5s 没返回就强制重置锁
  if (supabaseSyncing) {
    console.warn('上次保存未完成，稍后重试');
    setTimeout(save, 2000);
    return;
  }
  // 转换：null 值直接写入 Supabase（表示无背景）
  var bgImagesForSave = {};
  ['D','E','F'].forEach(function(z) {
    bgImagesForSave[z] = bgImages[z] || null;
  });
  supabaseSyncing = true;
  supabase.from('placements').upsert({
    id: DB_ID,
    zone: 'shared',
    data: { members: members, placements: placements, knivesLeft: knivesLeft, bgImages: bgImagesForSave }
  }).then(function() {
    supabaseSyncing = false;
    saveVersion++;
    document.getElementById('versionInfo').textContent = 'v' + saveVersion;
  }).catch(function(e) {
    supabaseSyncing = false;
    console.warn('Supabase 保存失败', e);
  });
}

// 操作锁函数
// ═══════════════════════════════════════════
function generateOperatorId() {
  return 'op_' + Math.random().toString(36).substring(2, 10) + '_' + Date.now();
}

function showLockModal() {
  document.getElementById('lockModal').classList.add('active');
  document.getElementById('lockPasswordInput').value = '';
  document.getElementById('lockErrorMsg').textContent = '';
  setTimeout(function() { document.getElementById('lockPasswordInput').focus(); }, 50);
}

function hideLockModal() {
  document.getElementById('lockModal').classList.remove('active');
}

function submitLockPassword() {
  var pwd = document.getElementById('lockPasswordInput').value.trim();
  if (!pwd) return;
  if (pwd !== OPERATOR_PASSWORD) {
    document.getElementById('lockErrorMsg').textContent = '口令错误，请重新输入';
    document.getElementById('lockPasswordInput').value = '';
    return;
  }
  hideLockModal();
  // 弹窗让用户输入昵称
  var name = prompt('请输入你的昵称（用于显示操作者）：');
  if (!name || !name.trim()) return;
  operatorName = name.trim();
  acquireLock();
}

async function acquireLock() {
  if (!supabaseAvailable) { alert('Supabase 未连接，无法获取操作权'); return; }
  try {
    // 检查当前锁状态
    var resp = await supabase
      .from('operator_lock')
      .select('*')
      .eq('id', LOCK_ID)
      .maybeSingle();
    var now = Date.now();
    var currentLock = resp && resp.data;
    // 锁已被占用且未过期，且不是自己
    if (currentLock && currentLock.lease_until > now && currentLock.operator_id !== operatorId) {
      var remaining = Math.ceil((currentLock.lease_until - now) / 1000);
      alert('操作权已被 ' + (currentLock.operator_name || '其他人') + ' 占用（剩余 ' + remaining + ' 秒），请稍后再试');
      return;
    }
    // 获取/设置操作者昵称
    if (!operatorName) {
      var name = prompt('请输入你的昵称（用于显示操作者）：');
      if (!name || !name.trim()) return;
      operatorName = name.trim();
    }
    // 如果还没有 operatorId，先生成
    if (!operatorId) operatorId = generateOperatorId();
    // 设置 lease
    leaseUntil = now + LOCK_LEASE_MS;
    await supabase.from('operator_lock').upsert({
      id: LOCK_ID,
      operator_id: operatorId,
      operator_name: operatorName,
      lease_until: leaseUntil,
      is_locked: true
    });
    isLockHolder = true;
    startLockHeartbeat();
    updateLockBanner();
    updateDragEnabled();
  } catch(e) { console.warn('获取操作权失败', e); }
}

async function releaseLock() {
  if (!isLockHolder) return;
  isLockHolder = false;
  stopLockHeartbeat();
  if (supabaseAvailable) {
    try {
      await supabase.from('operator_lock').upsert({
        id: LOCK_ID,
        operator_id: '',
        operator_name: '',
        lease_until: 0,
        is_locked: false
      });
    } catch(e) {}
  }
  updateLockBanner();
  updateDragEnabled();
}

async function refreshLock() {
  if (!isLockHolder || !supabaseAvailable) return;
  try {
    leaseUntil = Date.now() + LOCK_LEASE_MS;
    await supabase.from('operator_lock').upsert({
      id: LOCK_ID,
      lease_until: leaseUntil,
      is_locked: true
    });
    updateLockBanner();
  } catch(e) {
    console.warn('续lease失败，重新同步锁状态', e);
    // 网络错误/写入失败：重新拉取服务器状态，防止本地 hold 状态与服务器不一致
    stopLockHeartbeat();
    await fetchLockState();
    if (isLockHolder) startLockHeartbeat();
  }
}

async function fetchLockState() {
  if (!supabaseAvailable) return;
  try {
    var resp = await supabase
      .from('operator_lock')
      .select('*')
      .eq('id', LOCK_ID)
      .maybeSingle();
    if (!resp || !resp.data) return;
    var lock = resp.data;
    var now = Date.now();
    var expired = !lock.is_locked || lock.lease_until <= now;
    if (expired && isLockHolder) {
      // 自己的 lease 过期了
      isLockHolder = false;
      stopLockHeartbeat();
    }
    if (!expired && lock.operator_id === operatorId) {
      // 确认自己是 holder
      isLockHolder = true;
      leaseUntil = lock.lease_until;
      startLockHeartbeat();
    }
    window._cachedLock = {
      operator_id: lock.operator_id,
      operator_name: lock.operator_name,
      lease_until: lock.lease_until,
      is_locked: lock.is_locked
    };
    updateLockBanner();
    updateDragEnabled();
  } catch(e) {}
}

function startLockHeartbeat() {
  stopLockHeartbeat();
  // 每 20 秒续一次 lease
  lockHeartbeatTimer = setInterval(refreshLock, LOCK_REFRESH_MS);
}

function stopLockHeartbeat() {
  if (lockHeartbeatTimer) {
    clearInterval(lockHeartbeatTimer);
    lockHeartbeatTimer = null;
  }
}

function updateLockBanner() {
  var lockInfo = document.getElementById('lockInfo');
  var btnAcquire = document.getElementById('btnLock');
  var btnRelease = document.getElementById('btnRelease');
  if (!lockInfo) return;
  if (!supabaseAvailable) {
    lockInfo.textContent = '';
    lockInfo.className = 'lock-info';
    if (btnAcquire) btnAcquire.style.display = 'none';
    if (btnRelease) btnRelease.style.display = 'none';
    return;
  }
  lockInfo.className = 'lock-info active';
  if (btnAcquire) btnAcquire.style.display = isLockHolder ? 'none' : '';
  if (btnRelease) btnRelease.style.display = isLockHolder ? '' : 'none';
  if (isLockHolder) {
    lockInfo.innerHTML = '&#128274; 操作者：<span class="lock-name">' + operatorName + '（你）</span>';
  } else {
    var cached = window._cachedLock;
    if (cached && cached.is_locked && cached.lease_until > Date.now()) {
      lockInfo.innerHTML = '&#128274; 操作者：<span class="lock-name">' + (cached.operator_name || '未知') + '</span>（浏览）';
    } else {
      lockInfo.textContent = '暂无操作者';
    }
  }
}

function updateDragEnabled() {
  var chips = document.getElementById('memberChips');
  var mapContainer = document.getElementById('mapContainer');
  if (!chips || !mapContainer) return;
  if (isLockHolder) {
    chips.classList.remove('readonly');
    mapContainer.classList.remove('readonly');
    chips.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('locked'); c.draggable = true; });
    mapContainer.querySelectorAll('.placed').forEach(function(p) { p.draggable = true; });
  } else {
    chips.classList.add('readonly');
    mapContainer.classList.add('readonly');
    chips.querySelectorAll('.chip').forEach(function(c) { c.classList.add('locked'); c.draggable = false; });
    mapContainer.querySelectorAll('.placed').forEach(function(p) { p.draggable = false; });
  }
}

// ═══════════════════════════════════════════
// 渲染
// ═══════════════════════════════════════════
function render() {
  if (!dbReady) return; // 数据未就绪不渲染
  renderChips();
  renderMap();
  renderRecords();
}

// ═══════════════════════════════════════════
// 右键快捷菜单
// ═══════════════════════════════════════════
var ctxTargetName = '';
var lastSpendTime = 0; // 防连击
function showCtxMenu(e, name) {
  e.preventDefault();
  ctxTargetName = name;
  var menu = document.getElementById('ctxMenu');
  menu.style.display = 'block';
  var x = e.clientX, y = e.clientY;
  var mw = 130, mh = 120;
  if (x + mw > window.innerWidth) x = window.innerWidth - mw - 8;
  if (y + mh > window.innerHeight) y = window.innerHeight - mh - 8;
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
}
document.addEventListener('click', function() {
  document.getElementById('ctxMenu').style.display = 'none';
});
function ctxAction(count) {
  if (!ctxTargetName) return;
  spendKnivesQuick(ctxTargetName, count);
  ctxTargetName = '';
  document.getElementById('ctxMenu').style.display = 'none';
}

// 快捷消耗刀数（双击或右键菜单），仅标记，不上地图
function spendKnivesQuick(name, count) {
  if (!isLockHolder) { alert('请先获取操作权限'); return; }
  var now = Date.now();
  if (now - lastSpendTime < 300) return; // 300ms 防连击
  lastSpendTime = now;
  var left = knivesLeft[name] || 0;
  if (left <= 0) { alert('该成员已无刀可排'); return; }
  var toSpend = Math.min(count, left);
  knivesLeft[name] = left - toSpend;
  save();
  renderChips();
  renderCompleted();
}

// ═══════════════════════════════════════════
// 右侧撤回功能
// ═══════════════════════════════════════════
var ctxUndoTarget = '';
function showUndoMenu(e, name) {
  e.preventDefault();
  ctxUndoTarget = name;
  var menu = document.getElementById('ctxMenuUndo');
  menu.style.display = 'block';
  var x = e.clientX, y = e.clientY;
  var mw = 130, mh = 120;
  if (x + mw > window.innerWidth) x = window.innerWidth - mw - 8;
  if (y + mh > window.innerHeight) y = window.innerHeight - mh - 8;
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
}
document.addEventListener('click', function() {
  document.getElementById('ctxMenu').style.display = 'none';
  document.getElementById('ctxMenuUndo').style.display = 'none';
});
function ctxUndoAction(count) {
  if (!ctxUndoTarget) return;
  refundKnives(ctxUndoTarget, count);
  ctxUndoTarget = '';
  document.getElementById('ctxMenuUndo').style.display = 'none';
}

// 撤回刀数（右键菜单），从当前区移除记录
function refundKnives(name, count) {
  if (!isLockHolder) { alert('请先获取操作权限'); return; }
  var left = knivesLeft[name] || 0;
  var used = 3 - left;
  if (used <= 0) { alert('该成员没有可撤回的刀'); return; }
  var toRefund = Math.min(count, used);
  // placements 结构: { D: { name: [{x,y},...], ... }, E: {...}, F: {...} }
  var zone = placements[currentArea] || {};
  var nameArr = zone[name] || [];
  var removed = 0;
  for (var i = nameArr.length - 1; i >= 0 && removed < toRefund; i--) {
    nameArr.splice(i, 1);
    removed++;
  }
  zone[name] = nameArr;
  placements[currentArea] = zone;
  knivesLeft[name] = Math.min(3, left + toRefund);
  save();
  renderChips();
  renderCompleted();
  renderMap();
}

function renderChips() {
  var container = document.getElementById('memberChips');
  var totalLeft = 0;
  // 统计 knivesLeft > 0 的成员
  var active = members.filter(function(name) { return (knivesLeft[name] || 0) > 0; });
  var totalKnives = members.length * 3;
  var remainingKnives = 0;
  members.forEach(function(name) { remainingKnives += (knivesLeft[name] || 0); });
  document.getElementById('memberCount').textContent = totalKnives > 0 ? '(' + remainingKnives + '/' + totalKnives + ')' : '';
  container.innerHTML = '';

  active.forEach(function(name) {
    var left = knivesLeft[name] || 0;
    totalLeft += left;
    var chip = document.createElement('div');
    chip.className = 'chip';
    chip.draggable = true;
    chip.dataset.name = name;
    // 双击：快捷消耗1刀
    chip.addEventListener('dblclick', function(e) {
      e.stopPropagation();
      spendKnivesQuick(name, 1);
    });
    // 右键：显示快捷菜单
    chip.addEventListener('contextmenu', function(e) {
      e.stopPropagation();
      showCtxMenu(e, name);
    });

    var nameSpan = document.createElement('span');
    nameSpan.className = 'chip-name';
    nameSpan.textContent = escapeHtml(name);
    chip.appendChild(nameSpan);

    // 3格进度指示器
    var knivesDiv = document.createElement('div');
    knivesDiv.className = 'chip-knives';
    for (var i = 0; i < 3; i++) {
      var cell = document.createElement('span');
      if (i < left) {
        // 未用刀：绿色亮
        cell.title = '标记' + (i + 1) + '刀已完成';
        (function(idx, left, name) {
          cell.addEventListener('click', function(e) {
            e.stopPropagation();
            if (!isLockHolder) { alert('请先获取操作权限'); return; }
            var now = Date.now();
            if (now - lastSpendTime < 300) return;
            lastSpendTime = now;
            // 点击绿色格：仅标记已用，不上地图
            knivesLeft[name] = Math.max(0, left - 1);
            save();
            renderChips();
            renderCompleted();
          });
        })(i, left, name);
      } else {
        cell.classList.add('used');
      }
      knivesDiv.appendChild(cell);
    }
    chip.appendChild(knivesDiv);

    chip.addEventListener('dragstart', function(e) {
      if (!isLockHolder) { e.preventDefault(); return; }
      chip.classList.add('dragging');
      e.dataTransfer.setData('text/plain', name);
      e.dataTransfer.setData('application/ba-source', 'chip');
      e.dataTransfer.effectAllowed = 'copy';
    });
    chip.addEventListener('dragend', function() {
      chip.classList.remove('dragging');
    });
    chip.addEventListener('click', function() {
      if (!isLockHolder) { alert('请先获取操作权限'); }
    });

    container.appendChild(chip);
  });
}

function renderMap() {
  var bg = document.getElementById('mapBg');
  var noBg = document.getElementById('noBg');
  var noBgText1 = document.getElementById('noBgText1');
  var uploadLabel = document.getElementById('uploadLabel');

  if (noBgText1) noBgText1.textContent = '当前 ' + currentArea + ' 区还没有设置背景图';
  if (uploadLabel) uploadLabel.childNodes[0].textContent = '上传 ' + currentArea + ' 区背景图 ';

  // 已清空的区域（null）不显示背景
  if (bgImages[currentArea]) {
    document.getElementById('mapBg').src = bgImages[currentArea];
    document.getElementById('mapBg').style.display = 'block';
    noBg.style.display = 'none';
  } else {
    document.getElementById('mapBg').style.display = 'none';
    noBg.style.display = 'block';
  }

  // Remove old placed elements
  document.querySelectorAll('.placed').forEach(function(el) { el.remove(); });

  // Place members — 每个成员可能有多个位置（数组）
  var zonePlacements = placements[currentArea] || {};
  Object.entries(zonePlacements).forEach(function(entry) {
    var name = entry[0];
    var positions = entry[1]; // array of {x, y}
    positions.forEach(function(pos, idx) {
      createPlacedEl(name, pos.x, pos.y, false, idx);
    });
  });
}

function createPlacedEl(name, x, y, doSave, knifeIndex) {
  if (doSave === undefined) doSave = false;
  var container = document.getElementById('mapContainer');
  var el = document.createElement('div');
  el.className = 'placed';
  el.style.left = x + '%';
  el.style.top = y + '%';
  el.dataset.name = name;
  el.dataset.knife = knifeIndex !== undefined ? knifeIndex : 0;
  el.textContent = name;

  var delBtn = document.createElement('button');
  delBtn.className = 'del';
  delBtn.textContent = '×';
  delBtn.onclick = function(e) {
    e.stopPropagation();
    removePlacement(name, knifeIndex);
  };
  el.appendChild(delBtn);

  el.draggable = isLockHolder;
  el.addEventListener('dragstart', function(e) {
    if (!isLockHolder) { e.preventDefault(); return; }
    el.style.opacity = '0.5';
    e.dataTransfer.setData('text/plain', name);
    e.dataTransfer.setData('application/ba-source', 'placed');
    e.dataTransfer.setData('application/ba-knife', knifeIndex);
    e.dataTransfer.effectAllowed = 'move';
    // 记录当前拖拽的源元素和信息
    _dragSrcName = name;
    _dragSrcIdx = knifeIndex;
    _lastDragX = x;
    _lastDragY = y;
  });
  el.addEventListener('dragend', function(e) {
    el.style.opacity = '1';
    // 拖拽结束时，用 dragover 期间记录的坐标更新位置
    if (_dragSrcName === name && _dragSrcIdx === knifeIndex) {
      var rect = mapContainer.getBoundingClientRect();
      var nx = _lastDragX;
      var ny = _lastDragY;
      if (nx !== null && ny !== null) {
        var nxPct = ((nx - rect.left) / rect.width) * 100;
        var nyPct = ((ny - rect.top) / rect.height) * 100;
        nxPct = Math.max(3, Math.min(97, nxPct));
        nyPct = Math.max(3, Math.min(97, nyPct));
        var zone = placements[currentArea];
        if (zone && zone[name] && zone[name][knifeIndex] &&
            (Math.abs(zone[name][knifeIndex].x - nxPct) > 0.5 || Math.abs(zone[name][knifeIndex].y - nyPct) > 0.5)) {
          zone[name][knifeIndex] = { x: nxPct, y: nyPct };
          save();
          renderMap();
          renderRecords();
        }
      }
      _dragSrcName = null;
      _dragSrcIdx = null;
      _lastDragX = null;
      _lastDragY = null;
    }
  });
  // dragover 时持续记录鼠标在 mapContainer 内的坐标
  el.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    _lastDragX = e.clientX;
    _lastDragY = e.clientY;
  });

  container.appendChild(el);

  if (doSave) {
    if (!placements[currentArea]) placements[currentArea] = {};
    if (!placements[currentArea][name]) placements[currentArea][name] = [];
    placements[currentArea][name].push({ x: x, y: y });
    save();
    renderRecords();
  }
}

function renderCompleted() {
  var list = document.getElementById('recordList');
  // 只要出过至少1刀就显示（knivesLeft < 3）
  var active = members.filter(function(name) { return (knivesLeft[name] || 0) < 3; });
  var totalKnives = members.length * 3;
  var remainingKnives = 0;
  members.forEach(function(name) { remainingKnives += (knivesLeft[name] || 0); });
  var usedKnives = totalKnives - remainingKnives;
  document.getElementById('placedCount').textContent = totalKnives > 0 ? '(' + usedKnives + '/' + totalKnives + ')' : '';

  if (active.length === 0) {
    list.innerHTML = '<div class="empty-msg">暂无出刀记录<br>左侧安排出刀后显示于此</div>';
    return;
  }

  list.innerHTML = '';
  // 按剩余刀数升序排（先排满的）
  active.sort(function(a, b) { return (knivesLeft[a] || 0) - (knivesLeft[b] || 0); });
  active.forEach(function(name) {
    var left = knivesLeft[name] || 0;
    var used = 3 - left;

    var chip = document.createElement('div');
    chip.className = 'done-chip';
    // 双击：撤回1刀
    chip.addEventListener('dblclick', function(e) {
      e.stopPropagation();
      refundKnives(name, 1);
    });
    // 右键：显示撤回菜单
    chip.addEventListener('contextmenu', function(e) {
      e.stopPropagation();
      showUndoMenu(e, name);
    });

    var nameSpan = document.createElement('span');
    nameSpan.className = 'done-name';
    nameSpan.textContent = escapeHtml(name);
    chip.appendChild(nameSpan);

    var knivesDiv = document.createElement('div');
    knivesDiv.className = 'done-knives';
    for (var i = 0; i < 3; i++) {
      var cell = document.createElement('span');
      if (i < used) {
        cell.classList.add('used'); // 橙色=已用
      }
      knivesDiv.appendChild(cell);
    }
    chip.appendChild(knivesDiv);

    list.appendChild(chip);
  });
}

// 兼容旧名称
var renderRecords = renderCompleted;

function clearBg() {
  if (!isLockHolder) { alert('请先获取操作权限'); return; }
  if (!bgImages[currentArea]) {
    alert('当前区域没有背景图');
    return;
  }
  if (!confirm('确定清除 ' + currentArea + ' 区背景图？（' + Math.round((bgImages[currentArea]||'').length / 1024) + ' KB）')) return;
  bgImages[currentArea] = null;
  // 等待 IndexedDB 写完再渲染和保存
  idbPut('bgImages', bgImages).then(function() {
    save();
    renderMap();
  });
}

function clearAllPlacements() {
  if (!isLockHolder) { alert('请先获取操作权限'); return; }
  if (!confirm('确定清空所有区域的排刀记录？（成员名单保留，所有人刀数重置为3）')) return;
  placements = { D: {}, E: {}, F: {} };
  // knivesLeft 重置为3（由导入流程统一处理，这里只清 placement）
  members.forEach(function(name) { knivesLeft[name] = 3; });
  save();
  render();
}

// ═══════════════════════════════════════════
// 成员管理
// ═══════════════════════════════════════════
function removeMember(name) {
  if (!isLockHolder) { alert('请先获取操作权限'); return; }
  members = members.filter(function(m) { return m !== name; });
  delete knivesLeft[name];
  ['D','E','F'].forEach(function(z) {
    if (placements[z]) delete placements[z][name];
  });
  save();
  render();
}

// ═══════════════════════════════════════════
// 拖拽放置
// ═══════════════════════════════════════════
var mapPanel = document.getElementById('mapPanel');
var mapContainer = document.getElementById('mapContainer');

mapPanel.addEventListener('dragover', function(e) {
  e.preventDefault();
  var src = e.dataTransfer.getData('application/ba-source');
  e.dataTransfer.dropEffect = src === 'placed' ? 'move' : 'copy';
  _lastDragX = e.clientX;
  _lastDragY = e.clientY;
});
mapPanel.addEventListener('drop', function(e) {
  e.preventDefault();
  if (!isLockHolder) {
    alert('请先获取操作权限再进行排刀操作');
    return;
  }
  var name = e.dataTransfer.getData('text/plain');
  if (!name || members.indexOf(name) < 0) return;

  var rect = mapContainer.getBoundingClientRect();
  var x = ((e.clientX - rect.left) / rect.width) * 100;
  var y = ((e.clientY - rect.top) / rect.height) * 100;
  x = Math.max(3, Math.min(97, x));
  y = Math.max(3, Math.min(97, y));

  var source = e.dataTransfer.getData('application/ba-source');
  var zone = placements[currentArea] || {};
  var existing = zone[name] || [];

  if (source === 'placed') {
    // 从地图上已放置的元素拖拽：更新该刀的位置
    var knifeIdx = parseInt(e.dataTransfer.getData('application/ba-knife'), 10);
    if (!isNaN(knifeIdx) && zone[name] && zone[name][knifeIdx]) {
      zone[name][knifeIdx] = { x: x, y: y };
      save();
      renderMap();
      renderRecords();
    }
  } else {
    // 从成员列表 chip 拖拽：新增一刀，同时减少剩余刀数
    var totalKnives = 0;
    for (var a in placements) totalKnives += (placements[a][name] || []).length;
    if (totalKnives >= 3) {
      alert(name + ' 已排满3刀，无法继续添加');
      return;
    }
    existing.push({ x: x, y: y });
    zone[name] = existing;
    placements[currentArea] = zone;
    // 减少剩余刀数
    knivesLeft[name] = Math.max(0, (knivesLeft[name] || 0) - 1);
    save();
    renderChips();
    renderCompleted();
    renderMap();
  }
});

function removePlacement(name, knifeIndex) {
  if (!placements[currentArea] || !placements[currentArea][name]) return;
  if (knifeIndex !== undefined && knifeIndex !== null) {
    placements[currentArea][name].splice(knifeIndex, 1);
    if (placements[currentArea][name].length === 0) {
      delete placements[currentArea][name];
    }
  } else {
    delete placements[currentArea][name];
  }
  // 重新计算剩余刀数
  var total = 0;
  ['D','E','F'].forEach(function(z) { total += (placements[z] && placements[z][name] ? placements[z][name].length : 0); });
  knivesLeft[name] = Math.max(0, 3 - total);
  save();
  renderChips();
  renderCompleted();
  renderMap();
}

// ═══════════════════════════════════════════
// 背景上传
// ═══════════════════════════════════════════
function uploadBg(zone, input) {
  if (!isLockHolder) { alert('请先获取操作权限'); return; }
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    bgImages[zone] = e.target.result;
    // 等待 IndexedDB 写完再渲染和保存
    idbPut('bgImages', bgImages).then(function() {
      save();
      renderMap();
    });
  };
  reader.readAsDataURL(file);
  input.value = '';
}

// ═══════════════════════════════════════════
// 区域切换
// ═══════════════════════════════════════════
document.querySelectorAll('.tab').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentArea = btn.getAttribute('data-area');
    render();
  });
});

// ═══════════════════════════════════════════
// 导入导出
// ═══════════════════════════════════════════
function exportData() {
  try {
    var blob = new Blob([JSON.stringify({ members: members }, null, 2)], {type:'application/json'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'member_list.json';
    a.click();
  } catch(e) { alert('导出失败'); }
}

function importData() {
  if (!isLockHolder) { alert('请先获取操作权限'); return; }
  if (!confirm('确定导入新名单？（将清空所有排刀记录，所有人刀数重置为3）')) return;
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var d = JSON.parse(ev.target.result);
        members = d.members || [];
        // 清空所有排刀记录，重置剩余刀数
        placements = { D: {}, E: {}, F: {} };
        knivesLeft = {};
        members.forEach(function(name) { knivesLeft[name] = 3; });
        save();
        setTimeout(function() { render(); }, 100);
      } catch(err) { alert('导入失败: 文件格式错误'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ═══════════════════════════════════════════
// 工具
// ═══════════════════════════════════════════
function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ═══════════════════════════════════════════
// 启动
// ═══════════════════════════════════════════
init(); // initSupabase 内部在数据就绪后会自动 render，无需外部再调用
</script>
